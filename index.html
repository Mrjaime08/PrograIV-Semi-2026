<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Académico Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/vue-select@beta/dist/vue-select.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background-color: #eef2f7; font-family: 'Segoe UI', sans-serif; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header-custom { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: white; padding: 15px; font-weight: 600; letter-spacing: 1px; }
        .form-label-custom { font-size: 0.75rem; font-weight: 700; color: #6c757d; margin-bottom: 4px; text-transform: uppercase; }
        .form-control:focus, .form-select:focus { box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15); border-color: #86b7fe; }
        .table-custom thead { background-color: #343a40; color: white; }
        .table-custom th { font-weight: 500; border: none; padding: 12px; }
        .btn-custom { border-radius: 8px; font-weight: 600; margin-right: 5px; }
        .input-group input::placeholder { color: rgba(255,255,255,0.7); }
        .v-select .vs__dropdown-toggle { background: white; border-radius: 6px; padding: 4px; border: 1px solid #dee2e6; }
        
        .hover-elevate { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-elevate:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        
        html, body { height: 100%; }
        #app { min-height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; }
    </style>
</head>
<body>
    
    <div id="app">
        
        <div class="container main-content d-flex flex-column justify-content-center" v-if="!estaAutenticado">
            <login @login-exitoso="iniciarSesion"></login>
        </div>

        <div v-else class="d-flex flex-column min-vh-100">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold" href="#">::.. SISTEMA ACADÉMICO ..::</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center">
                            
                            <li class="nav-item me-2">
                                <a class="nav-link text-light fw-bold" :class="{ active: forms.dashboard.mostrar }" href="#" @click="abrirVentana('dashboard')">
                                    <i class="bi bi-house-door-fill"></i> Inicio
                                </a>
                            </li>

                            <li class="nav-item me-3" v-if="usuarioActual && usuarioActual.rol === 'superadmin'">
                                <a class="nav-link text-warning fw-bold" href="#" @click="abrirVentana('panel_admin')">
                                    <i class="bi bi-star-fill"></i> Aprobar Usuarios
                                </a>
                            </li>

                            <li class="nav-item"><a class="nav-link" :class="{ active: forms.alumnos.mostrar }" href="#" @click="abrirVentana('alumnos')">Alumnos</a></li>
                            <li class="nav-item"><a class="nav-link" :class="{ active: forms.materias.mostrar }" href="#" @click="abrirVentana('materias')">Materias</a></li>
                            <li class="nav-item"><a class="nav-link" :class="{ active: forms.docentes.mostrar }" href="#" @click="abrirVentana('docentes')">Docentes</a></li>
                            <li class="nav-item"><a class="nav-link" :class="{ active: forms.matriculas.mostrar }" href="#" @click="abrirVentana('matriculas')">Matrículas</a></li>
                            <li class="nav-item"><a class="nav-link" :class="{ active: forms.inscripciones.mostrar }" href="#" @click="abrirVentana('inscripciones')">Inscripciones</a></li>
                            
                            <li class="nav-item ms-3">
                                <button class="btn btn-outline-danger btn-sm" @click="cerrarSesion">
                                    <i class="bi bi-box-arrow-right"></i> Salir
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div id="appSistema" class="container pb-5 flex-grow-1">
                
                <dashboard ref="dashboard" v-show="forms.dashboard.mostrar" :usuario="usuarioActual" @navegar="abrirVentana"></dashboard>
                
                <panel_admin ref="panel_admin" v-show="forms.panel_admin.mostrar"></panel_admin>

                <alumnos ref="alumnos" :forms="forms" v-show="forms.alumnos.mostrar" @buscar='buscar("busqueda_alumnos", "obtenerAlumnos")'></alumnos>
                <busqueda_alumnos ref="busqueda_alumnos" v-show="forms.busqueda_alumnos.mostrar" @modificar='modificar("alumnos", "modificarAlumno", $event)'></busqueda_alumnos>

                <materias ref="materias" :forms="forms" v-show="forms.materias.mostrar" @buscar='buscar("busqueda_materias", "obtenerMaterias")'></materias>
                <busqueda_materias ref="busqueda_materias" v-show="forms.busqueda_materias.mostrar" @modificar='modificar("materias", "modificarMateria", $event)'></busqueda_materias>

                <docentes ref="docentes" :forms="forms" v-show="forms.docentes.mostrar" @buscar='buscar("busqueda_docentes", "obtenerDocentes")'></docentes>
                <busqueda_docentes ref="busqueda_docentes" v-show="forms.busqueda_docentes.mostrar" @modificar='modificar("docentes", "modificarDocente", $event)'></busqueda_docentes>

                <matriculas ref="matriculas" :forms="forms" v-show="forms.matriculas.mostrar" @buscar='buscar("busqueda_matriculas", "obtenerMatriculas")'></matriculas>
                <busqueda_matriculas ref="busqueda_matriculas" v-show="forms.busqueda_matriculas.mostrar" @modificar='modificar("matriculas", "modificarMatricula", $event)'></busqueda_matriculas>

                <inscripciones ref="inscripciones" :forms="forms" v-show="forms.inscripciones.mostrar" @buscar='buscar("busqueda_inscripciones", "obtenerInscripciones")'></inscripciones>
                <busqueda_inscripciones ref="busqueda_inscripciones" v-show="forms.busqueda_inscripciones.mostrar" @modificar='modificar("inscripciones", "modificarInscripcion", $event)'></busqueda_inscripciones>

            </div>

            <footer class="bg-dark text-light py-4 mt-auto shadow-lg border-top border-primary border-4">
                <div class="container text-center">
                    <div class="row align-items-center">
                        <div class="col-md-4 text-md-start mb-3 mb-md-0">
                            <span class="fw-bold d-block">::.. Sistema Académico Pro ..::</span>
                            <span class="text-muted small">Versión 1.0.0 &copy; 2026</span>
                        </div>
                        
                        <div class="col-md-4 mb-3 mb-md-0">
                            <i class="bi bi-code-slash text-primary fs-4"></i>
                            <span class="d-block text-light small mt-1">Desarrollado por <strong>Grupo 7</strong></span>
                            <span class="badge bg-primary mt-1">Ingeniería en Sistemas Y Redes Informaticas.</span>
                        </div>
                        
                        <div class="col-md-4 text-md-end">
                            <span class="d-block fw-bold text-light">Universidad Gerardo Barrios</span>
                            <span class="text-muted small">UGB</span>
                        </div>
                    </div>
                </div>
            </footer>

        </div> 
    </div> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/vue-select@beta"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.11.1/sha256.min.js"></script>

    <script src="dashboard.js"></script>  
    <script src="alumnos.js"></script>
    <script src="busqueda_alumnos.js"></script>
    <script src="materias.js"></script>
    <script src="busqueda_materias.js"></script>
    <script src="docentes.js"></script>
    <script src="busqueda_docentes.js"></script>
    <script src="matriculas.js"></script>
    <script src="busqueda_matriculas.js"></script>
    <script src="inscripciones.js"></script>
    <script src="busqueda_inscripciones.js"></script>
    <script src="login.js"></script>
    <script src="panel_admin.js"></script>
    <script src="Main.js"></script>
</body>
</html>
